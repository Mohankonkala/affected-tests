name: CI

on:
  pull_request:
    branches: [master]

# Pin the workflow's GITHUB_TOKEN to the minimum scope every step actually needs.
# Without this block the workflow inherits whatever the org-level default is
# (often `contents: write`), which is more than a `pull_request`-triggered build
# job needs and is a real supply-chain surface — a malicious PR could submit a
# workflow change in the same PR and gain whatever the default is.
# See issue #50.
permissions:
  contents: read

jobs:
  # Job graph:
  #
  #   dependency-review ── runs in parallel with build (no needs:)
  #
  #   build ──┬──► unit-tests   (needs: build — only after compile + package pass)
  #           └──► e2e-tests    (needs: build — same gate, runs in parallel)
  #
  # Each job pins actions to a commit SHA (see issue #51). Dependabot's
  # github-actions ecosystem keeps the SHAs current.

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # Compile production + test sources so downstream jobs hit a warm
      # Gradle cache. Test *execution* lives in unit-tests / e2e-tests.
      - name: Compile
        run: ./gradlew classes testClasses functionalTestClasses

      # Shadow JAR + remaining `check` hooks (no test execution here).
      - name: Package
        run: ./gradlew build -x test -x functionalTest

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # ProjectBuilder-level coverage of the decision engine, extension
      # wiring, --explain rendering, and locale edge cases.
      - name: Run unit tests
        run: ./gradlew :affected-tests-core:test :affected-tests-gradle:test

      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-reports
          path: |
            affected-tests-gradle/build/reports/tests/
            affected-tests-gradle/build/test-results/
            affected-tests-core/build/reports/tests/
            affected-tests-core/build/test-results/
          if-no-files-found: ignore
          retention-days: 14

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      # Cucumber + Gradle TestKit: real Gradle daemons through the full
      # plugin surface adopters consume (Shadow, plugin-publish, CC).
      - name: Run E2E tests
        run: ./gradlew :affected-tests-gradle:functionalTest

      - name: Upload E2E test reports
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-test-reports
          path: |
            affected-tests-gradle/build/reports/tests/
            affected-tests-gradle/build/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # Supply-chain gate. Diffs the PR's resolved Gradle dependency graph
  # against the master baseline submitted by dependency-submission.yml
  # and fails if any newly introduced dependency carries a known CVE at
  # `fail-on-severity` or above. Runs in parallel with `build` — no
  # `needs:` — so a compile failure does not block the dep review signal.
  #
  # Coverage of transitive deps depends on dependency-submission.yml
  # having run at least once on master. See issue #83.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

name: Release

on:
  push:
    branches: [master]
  # Manual trigger for non-patch releases. Supplying `version: 1.10.0` forces
  # axion-release to cut that exact tag instead of the default patch
  # auto-increment. Leave `version` empty to emulate the auto-trigger (which is
  # useful for re-running a failed publish against HEAD without landing a new
  # commit).
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit release version (e.g. 1.10.0). Leave empty for default patch auto-increment.'
        type: string
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      # Required by actions/attest-build-provenance to mint a workload-identity
      # OIDC token from GitHub's STS so Sigstore's transparency log
      # (Rekor) accepts the attestation as having come from this repo's
      # workflow rather than a forged one. Without `id-token: write`
      # the attest step fails with "missing id-token permission".
      id-token: write
      # Required so the attestation is written to this repo's
      # attestation log (visible at /vedanthvdev/affected-tests/attestations
      # and verifiable with `gh attestation verify`). See SECURITY.md
      # "Verifying artifact provenance" for the consumer-side flow.
      attestations: write

    env:
      # Route github.* context values through env vars rather than inlining
      # them into shell scripts. This prevents expression injection when those
      # values contain shell metacharacters (e.g. a branch ref with `;`, `$`
      # or backticks). The version input is treated the same way for
      # consistency â€” even though GitHub validates workflow_dispatch inputs,
      # routing it through env keeps one style across the whole workflow.
      GH_ACTOR: ${{ github.actor }}
      GH_TOKEN: ${{ github.token }}
      GH_REF_NAME: ${{ github.ref_name }}
      RELEASE_VERSION_INPUT: ${{ inputs.version }}

    # Every `uses:` below pins to a commit SHA, not a major-version tag.
    # See ci.yml + issue #51 for the full rationale; trailing comment
    # is the human-readable semver corresponding to the SHA.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Check if HEAD is already tagged
        id: tag_check
        run: |
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      # Pick the release version. Three sources in priority order:
      #
      #   1. `workflow_dispatch` input â€” for ad-hoc manual releases.
      #      Wins over everything because it's the most explicit.
      #   2. A `.release-version` file committed at repo root â€” for
      #      pre-committing the next minor/major on a push-to-master
      #      release without needing manual dispatch coordination. The
      #      consuming PR lands the file in the same commit that wants
      #      the non-default version; this workflow picks it up, tags
      #      that version, then deletes the file in a follow-up commit
      #      so subsequent pushes fall back to auto-patch-increment.
      #   3. Neither â€” axion-release auto-increments the patch number
      #      off the latest tag. Normal ongoing behaviour.
      #
      # The file path is validated as a SemVer string before use so a
      # malformed value blocks the release at config time rather than
      # cutting a bogus tag.
      - name: Resolve explicit release version
        id: version_override
        run: |
          if [[ -n "$RELEASE_VERSION_INPUT" ]]; then
            echo "Using workflow_dispatch input: $RELEASE_VERSION_INPUT"
            echo "source=input" >> "$GITHUB_OUTPUT"
            echo "value=$RELEASE_VERSION_INPUT" >> "$GITHUB_OUTPUT"
          elif [[ -f .release-version ]]; then
            V=$(tr -d '[:space:]' < .release-version)
            if [[ -z "$V" ]]; then
              echo "::error::.release-version file exists but is empty"
              exit 1
            fi
            if ! [[ "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::.release-version value '$V' is not SemVer (MAJOR.MINOR.PATCH[-prerelease])"
              exit 1
            fi
            echo "Using .release-version file: $V"
            echo "source=file" >> "$GITHUB_OUTPUT"
            echo "value=$V" >> "$GITHUB_OUTPUT"
          else
            echo "No explicit version â€” axion-release will auto-increment patch."
            echo "source=auto" >> "$GITHUB_OUTPUT"
          fi

      # Only create a new tag if HEAD is not already tagged. If a previous run
      # tagged successfully but failed during publish, re-running this workflow
      # will skip tagging and proceed straight to the "publish if missing" step
      # below â€” that's what makes the pipeline idempotent.
      - name: Release (tag and push)
        if: steps.tag_check.outputs.already_tagged == 'false'
        env:
          VERSION_OVERRIDE: ${{ steps.version_override.outputs.value }}
          VERSION_OVERRIDE_SOURCE: ${{ steps.version_override.outputs.source }}
        run: |
          VERSION_ARG=()
          if [[ "$VERSION_OVERRIDE_SOURCE" != "auto" ]]; then
            echo "Explicit release version requested (source=$VERSION_OVERRIDE_SOURCE): $VERSION_OVERRIDE"
            VERSION_ARG=("-Prelease.version=$VERSION_OVERRIDE")
          fi
          ./gradlew release -Prelease.pushTagsOnly \
            "${VERSION_ARG[@]}" \
            "-Prelease.customUsername=$GH_ACTOR" \
            "-Prelease.customPassword=$GH_TOKEN"

      - name: Resolve released version
        id: released
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version is release-quality
        env:
          VERSION: ${{ steps.released.outputs.version }}
        run: |
          if [[ "$VERSION" == *"-alpha"* || "$VERSION" == *"-SNAPSHOT"* ]]; then
            echo "::error::Unexpected version '$VERSION' â€” aborting publish"
            exit 1
          fi

      - name: Build
        run: ./gradlew clean build

      # Two idempotency checks â€” Plugin Portal (`portal_check`) and
      # Maven Central (`central_check`) â€” run BEFORE attestation so the
      # attest step can be gated on "either channel still needs to
      # publish". Otherwise, on a retry where one channel already has
      # the version and the other does not, attestation would be skipped
      # and the still-pending channel would receive a freshly-rebuilt
      # (un-attested) JAR. See issue #87.
      #
      # Plugin Portal already has the version â†’ skip Portal publish.
      # `clean build` always runs above, so the rebuilt JAR may have a
      # different SHA-256 than the run that originally published; that
      # is why we skip re-attesting AND re-publishing the Portal side.
      - name: Check if plugin version already published
        id: portal_check
        env:
          VERSION: ${{ steps.released.outputs.version }}
        run: |
          URL="https://plugins.gradle.org/plugin/io.github.vedanthvdev.affectedtests/$VERSION"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
          if [[ "$STATUS" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Plugin version $VERSION is already on the Gradle Plugin Portal â€” skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # Maven Central HEAD probe. A 200 means the version has propagated
      # to repo1.maven.org and we should skip re-upload. A 404 covers
      # both "not yet published" and "still in the 15-30 min propagation
      # window after a successful Sonatype publish" â€” the upload step
      # proceeds in both cases. If Sonatype rejects a duplicate (i.e.
      # the version is already staged or already released), the step
      # fails loud and the maintainer drops the staged deployment in
      # the Sonatype portal before re-running. See docs/RELEASING.md
      # for the recovery flow.
      - name: Check if Maven Central version already published
        id: central_check
        env:
          VERSION: ${{ steps.released.outputs.version }}
        run: |
          URL="https://repo1.maven.org/maven2/io/github/vedanthvdev/affected-tests-gradle/$VERSION/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
          if [[ "$STATUS" == "200" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already on Maven Central â€” skipping upload."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # SLSA build provenance attestation. Cryptographically binds the
      # JARs sitting in build/libs/ to (a) the exact commit being
      # released, (b) this workflow file at this SHA, and (c) the
      # workflow run that produced them. Recorded in Sigstore's public
      # transparency log (Rekor) and replayable by any consumer via
      # `gh attestation verify <jar> --owner vedanthvdev` â€” the gap
      # that the "personal namespace, no hash pinning" reviewer
      # feedback (issue #83) called out.
      #
      # Gated on EITHER channel still needing to publish so a retry
      # where (say) the Plugin Portal already has the version but
      # Maven Central does not still produces a fresh attestation that
      # matches the bytes about to land on Maven Central. Skipped only
      # when both channels are already done â€” re-attesting then would
      # bind a stale rebuild to no published artifact.
      #
      # Glob covers everything in build/libs/ produced by `clean build`:
      #   * The relocated shadow JAR (the plugin implementation)
      #   * The sources JAR (added by the vanniktech maven-publish
      #     plugin for Maven Central, see issue #87)
      #   * The javadoc JAR (same source)
      # All three come from the same workflow run and are tied to the
      # same commit, so attesting the full set means a consumer who
      # downloads sources/javadoc from Maven Central can verify those
      # too â€” not just the runtime JAR. The plugin marker JAR
      # auto-generated by `com.gradle.plugin-publish` is materialized
      # later (inside `publishPlugins`) and is a code-free POM stub,
      # so it's deliberately excluded.
      - name: Attest build provenance
        if: steps.portal_check.outputs.already_published == 'false' || steps.central_check.outputs.already_published == 'false'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            affected-tests-gradle/build/libs/*.jar

      - name: Publish to Gradle Plugin Portal
        if: steps.portal_check.outputs.already_published == 'false'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      # Publish to Sonatype Central Portal via the vanniktech plugin
      # configured in affected-tests-gradle/build.gradle.
      #
      # `publishToMavenCentral` (NOT `publishAndReleaseToMavenCentral`)
      # stages the deployment in the portal without auto-releasing.
      # The maintainer reviews it at https://central.sonatype.com,
      # then clicks Publish for the first few releases. Once the
      # pipeline is proven, flip `publishToMavenCentral(false)` to
      # `publishToMavenCentral(true)` in affected-tests-gradle/build.gradle
      # and switch the task here to `publishAndReleaseToMavenCentral`.
      #
      # Secrets are routed through `ORG_GRADLE_PROJECT_*` env vars,
      # which Gradle exposes as project properties â€” the same channel
      # vanniktech reads `mavenCentralUsername` / `signingInMemoryKey`
      # / etc. from. This avoids ever writing them to disk in
      # gradle.properties on the runner.
      - name: Publish to Maven Central
        if: steps.central_check.outputs.already_published == 'false'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew :affected-tests-gradle:publishToMavenCentral --no-configuration-cache

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.released.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --target "$GH_REF_NAME"
          else
            echo "GitHub Release $TAG already exists â€” skipping"
          fi

      # If the release version came from a `.release-version` file, delete
      # the file now that the tag has been pushed, the plugin has been
      # published, and the GitHub Release exists. Leaving the file in place
      # would either re-ship the same version on the next push (rejected
      # by Plugin Portal â†’ failed job) or starve auto-patch-increment.
      #
      # The cleanup commit is tagged `[skip ci]` so this workflow does
      # not trigger itself in a loop. Only runs when we actually tagged
      # (already_tagged == 'false') AND the version came from the file â€”
      # a workflow_dispatch input override must not consume the file, and
      # a rerun against an already-tagged HEAD must not touch the tree.
      - name: Consume .release-version override
        if: steps.version_override.outputs.source == 'file' && steps.tag_check.outputs.already_tagged == 'false'
        env:
          TAG: ${{ steps.released.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .release-version
          git commit -m "chore(release): consume .release-version after shipping $TAG [skip ci]"
          git push origin "HEAD:$GH_REF_NAME"
